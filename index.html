<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Solver</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Sudoku Solver</h1>
        <p>Enter your puzzle below and click Solve.</p>
        
        <div id="grid" class="sudoku-grid"></div>

        <div class="controls">
            <button id="solveBtn" class="btn primary">Solve Puzzle</button>
            <button id="clearBtn" class="btn secondary">Clear Grid</button>
        </div>

        <div id="message" class="message"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
